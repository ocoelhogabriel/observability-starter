name: Release Automation

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Tipo de incremento (patch, minor, major)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate and Set New Version
        run: |
          # Obtém a versão atual do pom.xml (atualmente 1.0.0)
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Versão atual: $CURRENT_VERSION"

          # Incremento SemVer
          IFS='.' read -ra ADDR <<< "${CURRENT_VERSION%-SNAPSHOT}"
          MAJOR=${ADDR[0]}
          MINOR=${ADDR[1]}
          PATCH=${ADDR[2]}

          if [ "${{ github.event.inputs.version_type }}" == "major" ]; then
            NEW_VERSION="$((MAJOR+1)).0.0"
          elif [ "${{ github.event.inputs.version_type }}" == "minor" ]; then
            NEW_VERSION="$MAJOR.$((MINOR+1)).0"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH+1))"
          fi

          echo "Nova versão: $NEW_VERSION"
          mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit and Tag
        run: |
          git add pom.xml
          git commit -m "chore: release version ${{ env.NEW_VERSION }}"
          git tag -a "v${{ env.NEW_VERSION }}" -m "Release version ${{ env.NEW_VERSION }}"
          git push origin main
          git push origin "v${{ env.NEW_VERSION }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cria a release oficial no GitHub com notas geradas automaticamente com base nos commits
          gh release create "v${{ env.NEW_VERSION }}" \
            --title "Release v${{ env.NEW_VERSION }}" \
            --generate-notes

      - name: Summary
        run: |
          echo "## 🚀 Release v${{ env.NEW_VERSION }} criada com sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "A tag foi enviada e a GitHub Release foi gerada com o changelog automático." >> $GITHUB_STEP_SUMMARY
